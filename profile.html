<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Profile</title>
    <link rel="stylesheet" href="css/profile.css">
</head>
<body>

    <section class="profile-section">
        <h1>Your Profile</h1>
        <p>Manage your details and main goals.</p>

       
        <div class="profile-card">
            <h3>User</h3>
            <p><strong>Main Goal:</strong> Stay productive!</p>
            <p><strong>Bio:</strong> No bio added yet.</p>
        </div>

        <div class="profile-form">
            <h3>Edit Info</h3>

            <label>Name</label>
            <input type="text" value="User">

            <label>Main Goal</label>
            <input type="text" value="Stay productive!">

            <label>Short Bio</label>
            <textarea placeholder="Tell us something about yourself"></textarea>

            <button>Save Profile</button>
        </div>
    </section>

</body>
</html>
